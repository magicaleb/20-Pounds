<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Calorie Flow" />
    <title>Calorie Flow</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">

      <!-- ① Thin progress strip -->
      <div class="progress-strip">
        <div class="strip-info">
          <span id="todayTotal">0</span>&thinsp;/&thinsp;<span id="targetText">2000</span>&thinsp;kcal
        </div>
        <div class="strip-bar">
          <div id="progressBar" class="bar-fill"></div>
        </div>
        <div class="strip-controls">
          <button type="button" class="small-btn" data-target-adjust="-100" aria-label="Decrease target">−</button>
          <button type="button" class="small-btn" data-target-adjust="100" aria-label="Increase target">+</button>
          <button id="themeBtn" class="flat-icon-btn" type="button" aria-label="Toggle theme">◐</button>
        </div>
      </div>

      <!-- ② Wizard -->
      <section class="wizard-card" aria-label="Quick entry wizard">
        <div class="wizard-head">
          <div class="step-track">
            <span class="step-pip active" id="pip1">1</span>
            <span class="step-arrow">›</span>
            <span class="step-pip" id="pip2">2</span>
            <span class="step-arrow">›</span>
            <span class="step-pip" id="pip3">3</span>
          </div>
          <h2 id="wizardTitle">What type of meal?</h2>
          <p id="wizardHint" class="muted">Pick a category to narrow choices.</p>
        </div>

        <!-- Step 1: category -->
        <div id="stepCat" class="wizard-step">
          <div id="catGrid" class="cat-grid"></div>
        </div>

        <!-- Step 2: food (filtered by category) -->
        <div id="stepFood" class="wizard-step" hidden>
          <div id="foodGrid" class="food-grid"></div>
          <div class="wizard-actions">
            <button id="backToCatBtn" class="secondary-btn" type="button">&#8592; Back</button>
          </div>
        </div>

        <!-- Step 3: size -->
        <div id="stepSize" class="wizard-step" hidden>
          <div id="selectedFoodPreview" class="selected-food"></div>
          <div id="sizeGrid" class="size-grid"></div>
          <div class="wizard-actions">
            <button id="backToFoodBtn" class="secondary-btn" type="button">&#8592; Back</button>
          </div>
        </div>
      </section>

      <!-- ③ Today's log (inside shell, scrolls internally) -->
      <section class="history-section card" aria-label="Today's log">
        <div class="history-head">
          <h2>Today's log</h2>
          <p id="entryCount" class="muted">0 entries</p>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>

    </div><!-- /.app-shell -->

    <dialog id="editDialog" class="edit-dialog">
      <form id="editForm" method="dialog" class="edit-form">
        <h3>Edit entry</h3>
        <p class="muted">Food</p>
        <div id="editFoodGrid" class="food-grid compact-grid"></div>
        <p class="muted">Size</p>
        <div id="editSizeGrid" class="size-grid"></div>
        <p id="editPreview" class="edit-preview">0 kcal</p>
        <div class="dialog-actions">
          <button type="button" id="cancelEditBtn" class="secondary-btn">Cancel</button>
          <button type="submit" class="primary-btn">Save</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite">
      <span id="toastText"></span>
      <button type="button" id="undoBtn" class="link-btn">Undo</button>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
