<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff4d6d" />
    <title>20 Pounds</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">

      <!-- LOG FOOD page -->
      <section class="page active" id="entryPage">
        <!-- Calorie ring -->
        <div class="ring-wrap">
          <svg class="ring-svg" viewBox="0 0 200 200" aria-hidden="true">
            <circle class="ring-track" cx="100" cy="100" r="80"/>
            <circle class="ring-fill" id="ringFill" cx="100" cy="100" r="80"/>
          </svg>
          <div class="ring-center">
            <div class="ring-num" id="ringNum">2,200</div>
            <div class="ring-lbl" id="ringLbl">left today</div>
          </div>
        </div>

        <!-- Search bar -->
        <div class="search-wrap">
          <input class="search-input" id="foodSearch" type="search" placeholder="Search anything…" autocomplete="off"/>
        </div>

        <!-- Food tiles (suggestions or search results) -->
        <div class="food-grid" id="foodGrid"></div>
      </section>

      <!-- DASHBOARD page -->
      <section class="page" id="dashboardPage">
        <div class="dashboard">
          <!-- Week chart -->
          <div class="week-row" id="weekRow"></div>

          <!-- Controls -->
          <div class="controls-card">
            <div class="goal-row">
              <input class="field goal-input" id="targetInput" type="number" inputmode="numeric" min="1" step="50" placeholder="Goal (cal)" />
              <button class="btn-save" id="saveTargetButton" type="button">Save</button>
            </div>
            <button class="btn-custom" id="customButton" type="button">+ Custom entry</button>
            <div class="util-row">
              <button class="btn-util" id="exportButton" type="button">Export CSV</button>
              <button class="btn-util danger" id="clearOldButton" type="button">Clear old</button>
            </div>
          </div>

          <!-- History -->
          <div class="history-card">
            <div class="hist-hdr">
              <span class="entry-count" id="entryCount"></span>
              <button class="btn-util" id="showAllButton" type="button" style="display:none">Show all</button>
            </div>
            <div class="history-list" id="historyList"></div>
          </div>
        </div>
      </section>

    </main>

    <!-- Tab bar -->
    <nav class="tabs" aria-label="App navigation">
      <button class="tab active" id="entryTab" type="button">Log</button>
      <button class="tab" id="dashboardTab" type="button">Today</button>
    </nav>

    <!-- Bottom sheet (portion picker) -->
    <div class="sheet-overlay" id="sheetOverlay">
      <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="Log portion">
        <div class="sheet-handle"></div>
        <div class="sheet-food">
          <div class="sheet-name" id="sheetName"></div>
          <div class="sheet-cal-wrap">
            <span class="sheet-cal" id="sheetCal">0</span>
            <span class="sheet-cal-unit">cal</span>
          </div>
        </div>
        <div class="sheet-portions" id="sheetPortions"></div>
        <div class="nudge-row">
          <button class="nudge minus" data-adjust="-100" type="button">−100</button>
          <button class="nudge minus" data-adjust="-50"  type="button">−50</button>
          <button class="nudge plus"  data-adjust="50"   type="button">+50</button>
          <button class="nudge plus"  data-adjust="100"  type="button">+100</button>
        </div>
        <button class="log-btn" id="sheetLogBtn" type="button">Log it</button>
      </div>
    </div>

    <!-- Edit modal -->
    <div class="modal-backdrop" id="entryModal" role="dialog" aria-modal="true" aria-label="Edit entry">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">Edit entry</h3>
          <button class="icon-button" id="closeModalButton" type="button" aria-label="Close">×</button>
        </div>
        <div class="section-label">Calories</div>
        <input class="field" id="modalCalories" type="number" inputmode="numeric" min="0" step="25" />
        <div class="section-label">Food</div>
        <input class="field" id="modalFood" maxlength="64" placeholder="Food name" />
        <div class="section-label">Note</div>
        <input class="field" id="modalNote" maxlength="64" placeholder="Optional" />
        <div class="section-label">Meal</div>
        <select class="field" id="modalType"></select>
        <div class="modal-actions">
          <button class="primary-button" id="saveEntryButton" type="button">Save</button>
          <button class="delete-button" id="deleteEntryButton" type="button">Delete</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"><span id="toastText">Saved</span><button id="undoButton" type="button">Undo</button></div>

    <script src="app.js"></script>
  </body>
</html>
