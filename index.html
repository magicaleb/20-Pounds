<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#6d28d9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Calorie Flow" />
    <title>Calorie Flow</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="topbar card">
        <div>
          <p class="kicker" id="todayLabel">Today</p>
          <h1 id="todayTotal">0 kcal</h1>
        </div>
        <button type="button" id="themeBtn" class="icon-btn" aria-label="Toggle theme">◐</button>
      </header>

      <section class="card progress-card" aria-label="Daily progress">
        <div class="progress-row">
          <div>
            <p class="muted">Daily target</p>
            <p id="targetText" class="target-text">0 / 2000</p>
          </div>
          <div class="target-controls" role="group" aria-label="Adjust target">
            <button type="button" class="icon-btn" data-target-adjust="-100">−100</button>
            <button type="button" class="icon-btn" data-target-adjust="100">+100</button>
          </div>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressBar" class="progress-fill"></div>
        </div>
      </section>

      <main>
        <section class="card entry-card">
          <div class="section-head">
            <h2>Quick add</h2>
            <p class="muted">One tap. Rough estimate. Move on.</p>
          </div>
          <div id="quickGrid" class="quick-grid"></div>

          <div class="composer">
            <h3>Smart estimate</h3>
            <div>
              <p class="chip-title">What are you logging?</p>
              <div id="mealTypeChips" class="chip-row"></div>
            </div>
            <div>
              <p class="chip-title">How big?</p>
              <div id="portionChips" class="chip-row"></div>
            </div>
            <div>
              <p class="chip-title">Density</p>
              <div id="densityChips" class="chip-row"></div>
            </div>
            <button type="button" id="smartAddBtn" class="primary-btn">Add estimate</button>
            <p id="smartPreview" class="muted preview"></p>
          </div>
        </section>

        <section class="card history-card">
          <div class="section-head">
            <h2>Entry history</h2>
            <p class="muted" id="entryCount">0 entries</p>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </main>
    </div>

    <dialog id="editDialog" class="edit-dialog">
      <form id="editForm" method="dialog" class="edit-form">
        <h3>Edit entry</h3>
        <div>
          <p class="chip-title">Type</p>
          <div id="editTypeChips" class="chip-row"></div>
        </div>
        <div>
          <p class="chip-title">Portion</p>
          <div id="editPortionChips" class="chip-row"></div>
        </div>
        <div>
          <p class="chip-title">Density</p>
          <div id="editDensityChips" class="chip-row"></div>
        </div>
        <div class="calorie-adjust">
          <button type="button" class="icon-btn" data-edit-adjust="-50">−50</button>
          <strong id="editCalories">0 kcal</strong>
          <button type="button" class="icon-btn" data-edit-adjust="50">+50</button>
        </div>
        <div class="dialog-actions">
          <button type="button" id="cancelEditBtn" class="secondary-btn">Cancel</button>
          <button type="submit" class="primary-btn">Save</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite">
      <span id="toastText"></span>
      <button type="button" id="undoBtn" class="link-btn">Undo</button>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
