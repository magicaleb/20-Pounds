<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0c0c14" />
    <title>20 Pounds</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">

      <!-- LOG FOOD (2-step: find → portion) -->
      <section class="page active" id="entryPage">
        <div class="entry-shell">

          <!-- Step 1: unified find (search + chips + results) -->
          <div class="step active" id="stepFind">
            <input class="search-input" id="foodSearch" placeholder="Search food…" autocomplete="off" type="search" />
            <div class="cat-chips" id="categoryChips"></div>
            <div class="results-list" id="resultsList"></div>
          </div>

          <!-- Step 2: portion -->
          <div class="step" id="stepPortion">
            <div class="food-hero">
              <div class="fh-left">
                <div class="fh-name" id="selectedFoodName">Food</div>
                <div class="fh-comps" id="compareList"></div>
              </div>
              <div class="fh-right">
                <span class="fh-cal" id="selectedCalories">0</span>
                <span class="fh-unit">cal</span>
              </div>
            </div>
            <div class="portion-grid" id="portionGrid"></div>
            <div class="cal-adjust">
              <button class="adjust-btn minus" data-adjust="-100" type="button">−100</button>
              <button class="adjust-btn minus" data-adjust="-50" type="button">−50</button>
              <button class="adjust-btn plus" data-adjust="50" type="button">+50</button>
              <button class="adjust-btn plus" data-adjust="100" type="button">+100</button>
            </div>
            <input class="field note-field" id="noteInput" maxlength="42" placeholder="Note (optional)" />
            <div class="step-actions">
              <button class="btn-back" id="backToFind" type="button">← Back</button>
              <button class="btn-log" id="addButton" type="button">Log it ✓</button>
            </div>
          </div>

        </div>
      </section>

      <!-- DASHBOARD -->
      <section class="page" id="dashboardPage">
        <div class="dashboard">

          <div class="hero" aria-label="Today's calorie summary">
            <div class="hero-top">
              <div class="hero-num">
                <span class="total" id="todayTotal">0</span><span class="hero-unit">cal</span>
              </div>
              <div class="hero-right">
                <div class="remain" id="remainingText">2,200 left</div>
                <div class="pct" id="progressText">0%</div>
              </div>
            </div>
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
          </div>

          <div class="controls-row">
            <div class="goal-row">
              <input class="field goal-input" id="targetInput" type="number" inputmode="numeric" min="1" step="50" placeholder="Daily goal (cal)" />
              <button class="btn-save" id="saveTargetButton" type="button">Save</button>
            </div>
            <button class="btn-custom" id="customButton" type="button">+ Custom entry</button>
            <div class="small-actions">
              <button class="btn-small" id="exportButton" type="button">Export CSV</button>
              <button class="btn-small danger" id="clearOldButton" type="button">Clear old</button>
            </div>
          </div>

          <div class="history-section">
            <div class="history-header">
              <span class="entry-count" id="entryCount">No entries yet</span>
              <button class="btn-small" id="showAllButton" type="button" style="display:none">Show all</button>
            </div>
            <div class="history-list" id="historyList"></div>
          </div>

        </div>
      </section>

    </main>

    <nav class="tabs" aria-label="App navigation">
      <button class="tab active" id="entryTab" type="button">Log food</button>
      <button class="tab" id="dashboardTab" type="button">Dashboard</button>
    </nav>

    <div class="modal-backdrop" id="entryModal" role="dialog" aria-modal="true" aria-label="Edit entry">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">Edit entry</h3>
          <button class="icon-button" id="closeModalButton" type="button" aria-label="Close">×</button>
        </div>
        <div class="section-label">Calories</div>
        <input class="field" id="modalCalories" type="number" inputmode="numeric" min="0" step="25" />
        <div class="section-label">Food</div>
        <input class="field" id="modalFood" maxlength="64" placeholder="Food name" />
        <div class="section-label">Note</div>
        <input class="field" id="modalNote" maxlength="64" placeholder="Optional" />
        <div class="section-label">Meal</div>
        <select class="field" id="modalType"></select>
        <div class="modal-actions">
          <button class="primary-button" id="saveEntryButton" type="button">Save</button>
          <button class="delete-button" id="deleteEntryButton" type="button">Delete</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"><span id="toastText">Saved</span><button id="undoButton" type="button">Undo</button></div>

    <script src="app.js"></script>
  </body>
</html>
