<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Calorie Flow" />
    <title>Calorie Flow</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top card">
        <div>
          <p id="todayLabel" class="muted">Today</p>
          <h1 id="todayTotal">0 kcal</h1>
        </div>
        <button id="themeBtn" class="icon-btn" type="button" aria-label="Toggle theme">◐</button>
      </header>

      <section class="card progress-card" aria-label="Daily progress">
        <div class="progress-head">
          <div>
            <p class="muted">Daily target</p>
            <p id="targetText" class="target-text">0 / 2000 kcal</p>
          </div>
          <div class="target-controls">
            <button type="button" class="small-btn" data-target-adjust="-100">−100</button>
            <button type="button" class="small-btn" data-target-adjust="100">+100</button>
          </div>
        </div>
        <div class="bar"><div id="progressBar" class="bar-fill"></div></div>
      </section>

      <section class="card wizard-card" aria-label="Quick entry wizard">
        <div class="wizard-head">
          <h2 id="wizardTitle">Step 1 · What did you eat?</h2>
          <p id="wizardHint" class="muted">Pick the closest option. Precision is not required.</p>
        </div>

        <div id="stepFood" class="wizard-step active">
          <div id="foodGrid" class="food-grid"></div>
        </div>

        <div id="stepSize" class="wizard-step" hidden>
          <div id="selectedFoodPreview" class="selected-food"></div>
          <div id="sizeGrid" class="size-grid"></div>
          <div class="wizard-actions">
            <button id="backToFoodBtn" class="secondary-btn" type="button">Previous</button>
          </div>
        </div>
      </section>

      <section class="card history-card">
        <div class="history-head">
          <h2>Today’s entries</h2>
          <p id="entryCount" class="muted">0 entries</p>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </div>

    <dialog id="editDialog" class="edit-dialog">
      <form id="editForm" method="dialog" class="edit-form">
        <h3>Edit entry</h3>
        <p class="muted">Food</p>
        <div id="editFoodGrid" class="food-grid compact-grid"></div>
        <p class="muted">Size</p>
        <div id="editSizeGrid" class="size-grid"></div>
        <p id="editPreview" class="edit-preview">0 kcal</p>
        <div class="dialog-actions">
          <button type="button" id="cancelEditBtn" class="secondary-btn">Cancel</button>
          <button type="submit" class="primary-btn">Save</button>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite">
      <span id="toastText"></span>
      <button type="button" id="undoBtn" class="link-btn">Undo</button>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
